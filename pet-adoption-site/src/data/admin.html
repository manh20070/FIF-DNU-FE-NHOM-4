<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- MENU -->

    <div class="sidebar">

        <h2>🐾 ADMIN</h2>

        <a href="#">Dashboard</a>
        <a href="#">Quản lý thú cưng</a>
        <a href="#">Đơn nhận nuôi</a>
        <a href="#">Người dùng</a>
        <a href="#">Đăng xuất</a>

    </div>

    <!-- CONTENT -->

    <div class="content">

        <h1>Trang quản trị</h1>

        <!-- THỐNG KÊ -->

        <div class="cards">

            <div class="card">
                <h3>Tổng thú cưng</h3>
                <p id="tongThuCung"></p>
            </div>

            <div class="card">
                <h3>Đơn nhận nuôi</h3>
                <p id="tongDon"></p>
            </div>

            <div class="card">
                <h3>Người dùng</h3>
                <p id="tongUser"></p>
            </div>

        </div>
        
        <h2>Thêm thú cưng</h2>

<div class="form-add">

    <input type="text" id="name" placeholder="Tên thú cưng">

    <input type="text" id="type" placeholder="Loại">

    <input type="number" id="age" placeholder="Tuổi">

    <button onclick="themPet()">
        Thêm
    </button>

</div>

        <!-- BẢNG -->

        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Loại</th>
                    <th>Tuổi</th>
                    <th>Hành động</th>
                </tr>

            </thead>

            <tbody id="petList">

            </tbody>

        </table>

    </div>

    <script src="admin.js"></script>
</body>
</html>
