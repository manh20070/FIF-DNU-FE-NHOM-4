<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-box">

        <div class="logo">
            🐾
        </div>

        <h1>Đăng nhập</h1>

        <div class="input-box">
            <input type="email" id="email" placeholder="Nhập email">
        </div>

        <div class="input-box">
            <input type="password" id="password" placeholder="Nhập mật khẩu">
        </div>

        <button onclick="login()">
            Đăng nhập
        </button>

        <p>
            Chưa có tài khoản?
            <a href="#">Đăng ký</a>
        </p>

        <p id="thongBao"></p>

    </div>

    <script src="login.js"></script>
</body>
</html>
